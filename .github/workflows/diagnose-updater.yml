name: 诊断中文版更新前端

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/diagnose-updater.yml"
      - "scripts/**"

permissions:
  contents: read
  issues: write

jobs:
  diagnose:
    name: 更新版前端诊断
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      UPSTREAM_REF: v1.1.0
      DESKEMY_ZH_VERSION: 1.1.1
      TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}

    steps:
      - name: 检出汉化仓库
        uses: actions/checkout@v4
        with:
          path: localization
          persist-credentials: false

      - name: 检出官方源码
        uses: actions/checkout@v4
        with:
          repository: NFRohan/Deskemy
          ref: ${{ env.UPSTREAM_REF }}
          path: deskemy
          fetch-depth: 1
          lfs: true
          persist-credentials: false

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 应用汉化并启用更新
        shell: pwsh
        run: |
          Copy-Item -LiteralPath 'deskemy/src/routes/watch/[lectureId]/+page.svelte' -Destination 'updater-watch-original.svelte' -Force
          node localization/scripts/localize-zh.mjs deskemy
          node localization/scripts/fix-build.mjs deskemy
          node localization/scripts/enable-updater.mjs deskemy
          Copy-Item -LiteralPath 'deskemy/src/routes/watch/[lectureId]/+page.svelte' -Destination 'updater-watch-page.svelte' -Force

      - name: 安装依赖
        working-directory: deskemy
        shell: pwsh
        run: npm ci

      - name: 执行前端检查
        id: check
        working-directory: deskemy
        shell: pwsh
        continue-on-error: true
        run: |
          npm run check -- --output machine 2>&1 | Tee-Object -FilePath ../updater-svelte-check.log
          "exit_code=$LASTEXITCODE" >> $env:GITHUB_OUTPUT
          exit 0

      - name: 写入诊断 Issue
        if: steps.check.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const title = '自动诊断：应用内更新版前端检查失败';
            let log = fs.readFileSync('updater-svelte-check.log', 'utf8');
            if (log.length > 55000) log = log.slice(-55000);
            const body = [
              `运行：${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              '```text',
              log,
              '```',
            ].join('\n');
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 100,
            });
            const existing = issues.find((x) => x.title === title && !x.pull_request);
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: 'open',
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }

      - name: 关闭已解决的诊断 Issue
        if: steps.check.outputs.exit_code == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '自动诊断：应用内更新版前端检查失败';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const existing = issues.find((x) => x.title === title && !x.pull_request);
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: 'closed',
                state_reason: 'completed',
              });
            }

      - name: 上传检查日志和转换源码
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: updater-svelte-check
          path: |
            updater-svelte-check.log
            updater-watch-original.svelte
            updater-watch-page.svelte
          retention-days: 14

      - name: 检查失败
        if: steps.check.outputs.exit_code != '0'
        shell: pwsh
        run: exit 1
